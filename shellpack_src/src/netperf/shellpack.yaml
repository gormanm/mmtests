default-metric: tcpstream-send

metrics:
  - tcpstream-send
  - udpstream-send
  - udpstream-recv
  - tcprr-send
  - udprr-send
  - streamstream-send

summarise: Multiops
preferhigher: true
PlotXaxis: Buffer Size Bytes
PlotType: operation-candlesticks

netperf-ipv4-tcp-rr:
  ratio-metric: tcprr-send

netperf-ipv4-udp-rr:
  ratio-metric: udprr-send

netperf-ipv4-tcp:
  ratio-metric: tcpstream-send

netperf-ipv4-udp:
  ratio-metric: udpstream-send

netperf-unix:
  ratio-metric: streamstream-send

tcprr-send:
  title: NetPerf TCP RR
  units: MBITS_PER_SECOND

tcpstream-send:
  title: NetPerf TCP STREAM
  units: MBITS_PER_SECOND

udprr-send:
  title: NetPerf UDP RR
  units: MBITS_PER_SECOND

udpstream-send:
  title: NetPerf UDP STREAM
  units: MBITS_PER_SECOND

udpstream-recv:
  title: NetPerf UDP STREAM
  units: MBITS_PER_SECOND

streamstream-send:
  title: NetPerf UNIX STREAM
  units: MBITS_PER_SECOND
